name: lint

on:
  push:
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The fork's own scripts are held to shellcheck's full default severity.
      - name: shellcheck fork scripts (strict)
        run: shellcheck -s sh portmanteaus/*

      # Upstream git-* scripts are left byte-for-byte identical to nvie/git-toolbelt
      # so upstream merges stay clean; they carry pre-existing style/info/warning
      # findings. Lint them at error severity to catch genuine bugs (e.g. from a
      # future upstream merge) without failing on inherited style noise.
      - name: shellcheck upstream scripts (errors only)
        run: shellcheck --severity=error git-*
